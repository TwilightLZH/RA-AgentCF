# Atomic File Format
field_separator: "\t"
seq_separator: " "

# Basic Information
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp
seq_len: ~
LABEL_FIELD: label
threshold: ~
NEG_PREFIX: neg_

# Sequential Model Needed
ITEM_LIST_LENGTH_FIELD: item_length
LIST_SUFFIX: _list
MAX_ITEM_LIST_LENGTH: 50
POSITION_FIELD: position_id

# Selectively Loading
load_col:
    inter: [user_id, item_id_list, item_id]
unload_col: ~
unused_col: ~

# Filtering
rm_dup_inter: ~
val_interval: ~
filter_inter_by_user_or_item: True
user_inter_num_interval: ~
item_inter_num_interval: ~

# Preprocessing
alias_of_user_id: ~
alias_of_item_id: [item_id_list]
preload_weight: ~
normalize_field: ~
normalize_all: True

benchmark_filename: [train, valid, test]
sampled_user_suffix: random
recall_budget: 10
fix_pos: -1
has_gt: True

eval_args:
  split: {'LS': 'valid_and_test'}
  order: TO
  group_by: user
  mode: {'valid': 'full', 'test': 'full'}

metrics: ["Recall", "NDCG"]
topk: [1, 3, 5, 7, 10]
valid_metric: NDCG@10

train_neg_sample_args:
  distribution: popularity
  sample_num: 1
  alpha: 1.0
  dynamic: False
  candidate_num: 0

user_group_order: ~
ra_revenue_source: file
