# RA-AgentCF stores revenue-aware additions and e-commerce prompt overrides here.
# Dataset-specific paths are loaded from props/{dataset}.yaml when available.

data_path: ../agentcf/dataset/
record_path: ../agentcf/dataset/
max_his_len: 20
MAX_ITEM_LIST_LENGTH: 20
debug: False

ra_enabled: True

# Trade-off between AgentCF preference ranking and revenue-aware commercial signals.
# 0.0 means pure AgentCF preference. Larger values strengthen revenue-aware reranking.
ra_alpha: 0.0

# Options:
# multiplicative: conservative utility multiplier.
# linear / linear_utility: preference-utility weighted sum.
# linear_revenue: preference-revenue weighted sum.
# constrained_revenue: revenue-oriented rerank inside a preference gate.
# constrained_utility: utility-oriented rerank inside a preference gate.
ra_fusion_mode: constrained_utility
ra_preference_threshold: 0.35
ra_low_preference_penalty: 0.8

# Expose revenue-aware signals to the LLM prompt, not only to post-processing.
ra_inject_revenue_context: True

# If no external revenue file is provided, a stable synthetic revenue profile is generated.
ra_revenue_source: synthetic
ra_revenue_file: ~
ra_item_behavior_file: ~
ra_user_profile_file: ~
ra_revenue_seed: 2026
ra_revenue_min: 1.0
ra_revenue_max: 10.0
ra_popularity_weight: 0.25
ra_revenue_risk_penalty: 0.20

# Revenue normalization for long-tailed e-commerce prices.
# Options: minmax, percentile, log, log_percentile.
# log_percentile clips extreme top prices by percentile, then applies log1p.
ra_revenue_normalization: log_percentile
ra_revenue_percentile: 98

user_prompt_system_role: |
  You are an online shopping user.
  Here is your previous self-introduction, describing your product preferences, dislikes, price tolerance, and shopping habits:
  '$user_description'.

system_prompt_template: |
  You are an online shopping user. Here is your self-introduction, expressing your preferences, dislikes, and price tolerance: '$user_description'.

  Now you are choosing one product from two candidate products. Their features and commercial evidence are listed below:
  $list_of_item_description.

  Commercial evidence guide:
  - base_revenue is the original estimated revenue or price. Higher means larger platform revenue if purchased.
  - normalized_revenue rescales base_revenue to 0-1 after long-tail normalization.
  - user_acceptance estimates whether this user would plausibly accept the product, including preference and price tolerance.
  - conversion_confidence estimates purchase confidence from behavioral evidence.
  - expected_commercial_utility combines normalized_revenue, user_acceptance, and conversion_confidence.

  Goal: select the product with the higher expected platform revenue, but only if it remains a plausible fit for the user's preferences and price tolerance. Do not choose a high-revenue item that the user is unlikely to accept.

  Output exactly two lines and no extra text:
  Choice: <exact selected product title>
  Explanation: <one concise reason balancing user fit and expected platform revenue>

system_prompt_template_evaluation_basic: |
  I am an online shopping user. Here is my self-introduction, including my preferences, dislikes, and price tolerance:

  '$user_description'.

  Now I am looking for products from $candidate_num candidates. The product features and commercial evidence are listed below:
  $example_list_of_item_description.

  Commercial evidence guide:
  - base_revenue is the original estimated revenue or price. Higher means larger platform revenue if purchased.
  - normalized_revenue rescales base_revenue to 0-1 after long-tail normalization.
  - user_acceptance estimates whether I would plausibly accept the product, including preference and price tolerance.
  - conversion_confidence estimates purchase confidence from behavioral evidence.
  - expected_commercial_utility combines normalized_revenue, user_acceptance, and conversion_confidence.

  Please rank these products to maximize expected platform revenue under a user-acceptance constraint. First discard products that are clearly implausible for my preferences or price tolerance. Among plausible products, prefer candidates with stronger expected commercial return. Copy product titles exactly from the candidate list.

  Output only this format:
  Rank:
  1. <exact product title>
  2. <exact product title>
  ...

system_prompt_template_evaluation_sequential: |
  I am an online shopping user. Here is my self-introduction: '$user_description'. My recent browsing and purchasing history is:
  $historical_interactions.

  Now I am looking for products from $candidate_num candidates. The product features and commercial evidence are listed below:
  $example_list_of_item_description.

  Commercial evidence guide:
  - base_revenue is the original estimated revenue or price. Higher means larger platform revenue if purchased.
  - normalized_revenue rescales base_revenue to 0-1 after long-tail normalization.
  - user_acceptance estimates whether I would plausibly accept the product, including preference and price tolerance.
  - conversion_confidence estimates purchase confidence from behavioral evidence.
  - expected_commercial_utility combines normalized_revenue, user_acceptance, and conversion_confidence.

  Please rank these products to maximize expected platform revenue under a user-acceptance constraint. Use my history to judge product fit, then prioritize stronger expected commercial return among plausible candidates. Copy product titles exactly from the candidate list.

  Output only this format:
  Rank:
  1. <exact product title>
  2. <exact product title>
  ...

system_prompt_template_evaluation_retrieval: |
  I am an online shopping user. My previous self-introduction is: '$user_past_description'. My updated self-introduction is: '$user_description'.

  Now I am looking for products from $candidate_num candidates. The product features and commercial evidence are listed below:
  $example_list_of_item_description.

  Commercial evidence guide:
  - base_revenue is the original estimated revenue or price. Higher means larger platform revenue if purchased.
  - normalized_revenue rescales base_revenue to 0-1 after long-tail normalization.
  - user_acceptance estimates whether I would plausibly accept the product, including preference and price tolerance.
  - conversion_confidence estimates purchase confidence from behavioral evidence.
  - expected_commercial_utility combines normalized_revenue, user_acceptance, and conversion_confidence.

  Please rank these products to maximize expected platform revenue under a user-acceptance constraint. Use my current and past preferences to judge plausibility, then prioritize stronger expected commercial return among plausible candidates. Copy product titles exactly from the candidate list.

  Output only this format:
  Rank:
  1. <exact product title>
  2. <exact product title>
  ...
user_prompt_template: "Recently, you compared two candidate products:\n$list_of_item_description.\n\nYou initially selected '$neg_item_title' and rejected the other product, with this explanation:\n'$system_reason'.\n\nHowever, the actual purchase feedback shows that '$pos_item_title' better matched your needs while '$neg_item_title' did not convert. Please update your self-introduction by incorporating the preference, dislike, price-related, and conversion evidence from this interaction. Use readable product categories such as 'kitchen refrigerator' or 'tool light' instead of raw category paths when possible.\n\nOutput format: 'My updated self-introduction: [updated self-introduction]'. Keep it under 180 words."
user_prompt_template_true: "Recently, you compared two candidate products:\n$list_of_item_description.\n\nYou selected '$pos_item_title' and rejected '$neg_item_title', with this explanation:\n'$system_reason'.\n\nThe actual purchase feedback confirms this choice. Please update your self-introduction by incorporating the preference, dislike, price-related, and conversion evidence from this interaction. Use readable product categories such as 'kitchen refrigerator' or 'tool light' instead of raw category paths when possible.\n\nOutput format: 'My updated self-introduction: [updated self-introduction]'. Keep it under 180 words."
item_prompt_template: "Here is the self-introduction of a user: '$user_description'.\nThe user compared two products:\n$list_of_item_description.\n\nThe system recommended '$neg_item_title', but actual feedback shows '$pos_item_title' was the better purchase candidate. Please update the descriptions of the two products to better reflect the preference and conversion evidence. Write natural e-commerce product descriptions; avoid raw category paths like 'appliances.kitchen.refrigerators' when a readable phrase such as 'kitchen refrigerator' is available. Keep the product id only if it helps distinguish similar products.\n\nOutput format: 'The updated description of the first product is: [description]. \n The updated description of the second product is: [description].'. Each description must be under 50 words."
item_prompt_template_true: "Here is the self-introduction of a user: '$user_description'.\nThe user compared two products:\n$list_of_item_description.\n\nThe user selected '$pos_item_title' and rejected '$neg_item_title'. Please update the descriptions of the two products by incorporating the preference and conversion evidence. Write natural e-commerce product descriptions; avoid raw category paths like 'appliances.kitchen.refrigerators' when a readable phrase such as 'kitchen refrigerator' is available. Keep the product id only if it helps distinguish similar products.\n\nOutput format: 'The updated description of the first product is: [description]. \n The updated description of the second product is: [description].'. Each description must be under 50 words."
